<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    
<!--excerise 1 to 4 are present in this page-->
<div class="bg-light p-5 text-center">
  <h2>My First Bootstrap Page</h2>
  <p>Some Bootstrap buttons:</p>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">Primary</button>
  <button class="btn btn-success">Success</button>

  <div class="modal fade" id="myModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">My First Modal</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                Hello from Bootstrap Modal!
            </div>

        </div>
    </div>
  </div>

  <!--column tht is responsive, tablet, mobile and desktop view-->
  <div class="container">
    <div class="row">
        <div class="col-12 col-md-6 col-lg-4">Column 1</div>
        <div class="col-12 col-md-6 col-lg-4">Column 2</div>
        <div class="col-12 col-md-6 col-lg-4">Column 3</div>
    </div>
  </div>

  <!--spaced as 3:9-->
  <div class="container">
    <div class="row">
        <div class="col-md-3 border p-3"><h3>Sidebar</h3>
            <p>item 1</p>
            <p>item 2</p>
            <p>item 3</p>
        </div>
        <div class="col-md-9 border p-3"><h3>Main section</h3>
            <p>item1</p>
            <p>item2</p>
            <p>item3</p>
        </div>
    </div>
  </div>

  <!--spaced equally,  4 columns-->
  <div class="container">
    <div class="row">
        <div class="col-sm-3">Column 1</div>
        <div class="col-sm-3">Column 2</div>
        <div class="col-sm-3">Column 3</div>
        <div class="col-sm-3">Column 4</div>
    </div>
  </div>
</div>

</body>
</html>
